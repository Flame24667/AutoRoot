directories:
  output: release
  buildResources: build
appId: com.autoroot.desktop
productName: AutoRoot
files:
  - filter:
      - electron/**/*
      - frontend/dist/**/*
extraResources:
  - filter:
      - bin/*
win:
  target:
    - target: nsis
      arch:
        - x64
  forceCodeSigning: false
  verifyUpdateCodeSignature: false
  signtoolOptions: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: AutoRoot
publish: null
electronVersion: 41.2.1
